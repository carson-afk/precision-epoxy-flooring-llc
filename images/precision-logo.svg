<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Precision Epoxy Flooring">
  <title>Precision Epoxy Flooring LLC</title>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F0F0F"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1A5BAA"/>
      <stop offset="50%" stop-color="#2E7BD8"/>
      <stop offset="100%" stop-color="#1A5BAA"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="120" height="120" rx="14" fill="url(#bgGrad)"/>

  <!-- Top-left + bottom-right blue notch corners -->
  <path d="M0 0 L20 0 L0 20 Z" fill="#2E7BD8"/>
  <path d="M120 120 L100 120 L120 100 Z" fill="#2E7BD8"/>

  <!-- Subtle inner frame -->
  <rect x="6" y="6" width="108" height="108" rx="11" fill="none" stroke="#2E7BD8" stroke-width="0.6" opacity="0.35"/>

  <!-- Custom geometric P -->
  <g fill="#FFFFFF">
    <!-- Vertical stem -->
    <rect x="32" y="22" width="13" height="64"/>
    <!-- Bowl (top) -->
    <path d="M45 22 L68 22 C82 22 88 30 88 40 C88 50 82 58 68 58 L45 58 Z M45 32 L66 32 C72 32 76 35 76 40 C76 45 72 48 66 48 L45 48 Z" fill-rule="evenodd"/>
  </g>

  <!-- Blue floor coating layers (cross-section feel) -->
  <rect x="14" y="92" width="92" height="3" fill="url(#blueGrad)"/>
  <rect x="14" y="97" width="92" height="1.5" fill="#2E7BD8" opacity="0.55"/>
  <rect x="14" y="100.5" width="92" height="1" fill="#2E7BD8" opacity="0.3"/>

  <!-- Wordmark -->
  <text x="60" y="112" text-anchor="middle"
        font-family="Helvetica, 'Helvetica Neue', Arial, sans-serif"
        font-weight="800" font-size="7" fill="#FFFFFF" letter-spacing="2.6">PRECISION</text>
</svg>
